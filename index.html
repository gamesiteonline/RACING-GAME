<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Street Nitro</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    canvas { display: block; }
    #ui-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
    #ui-overlay > * { pointer-events: auto; }
    .hidden { display: none !important; }
    @font-face { font-family: 'Racing'; src: local('Arial Black'); font-weight: 900; }
    .btn { cursor: pointer; border: none; font-family: 'Segoe UI', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; transition: transform 0.1s, box-shadow 0.2s; }
    .btn:active { transform: scale(0.95); }
    .neon-btn { background: linear-gradient(135deg, #ff6a00, #ee0979); color: #fff; border: 2px solid rgba(255,255,255,0.3); box-shadow: 0 0 20px rgba(238,9,121,0.5); border-radius: 8px; padding: 14px 32px; font-size: 16px; }
    .neon-btn:hover { box-shadow: 0 0 40px rgba(238,9,121,0.8); }
    .neon-blue-btn { background: linear-gradient(135deg, #00b4db, #0083b0); color: #fff; border: 2px solid rgba(255,255,255,0.3); box-shadow: 0 0 20px rgba(0,180,219,0.5); border-radius: 8px; padding: 14px 32px; font-size: 16px; }
    .neon-blue-btn:hover { box-shadow: 0 0 40px rgba(0,180,219,0.8); }
    #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: #fff; }
    #loading-screen h1 { font-size: 48px; font-weight: 900; background: linear-gradient(135deg, #ff6a00, #ee0979); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
    .loader { width: 60px; height: 60px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #ee0979; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-screen p { margin-top: 16px; color: #888; font-size: 14px; }
    #intro-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; color: #fff; overflow: hidden; }
    #intro-screen .speed-line { position: absolute; width: 2px; height: 100px; background: linear-gradient(to bottom, transparent, #ff6a00, transparent); opacity: 0; animation: speedLine 1.5s linear infinite; }
    #intro-screen .speed-line:nth-child(1) { left: 10%; animation-delay: 0s; }
    #intro-screen .speed-line:nth-child(2) { left: 30%; animation-delay: 0.3s; }
    #intro-screen .speed-line:nth-child(3) { left: 50%; animation-delay: 0.6s; }
    #intro-screen .speed-line:nth-child(4) { left: 70%; animation-delay: 0.9s; }
    #intro-screen .speed-line:nth-child(5) { left: 90%; animation-delay: 1.2s; }
    @keyframes speedLine { 0% { transform: translateY(100vh); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-100vh); opacity: 0; } }
    .intro-logo { font-size: 28px; font-weight: 300; letter-spacing: 8px; color: #666; margin-bottom: 20px; opacity: 0; animation: fadeIn 1s forwards 0.3s; }
    .intro-logo span { color: #ff6a00; font-weight: 700; }
    .intro-title { font-size: 72px; font-weight: 900; background: linear-gradient(135deg, #ff6a00, #ee0979, #ff6a00); background-size: 200% 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 6px; opacity: 0; animation: titleGlow 3s ease-in-out infinite, fadeIn 1s forwards 0.8s; }
    @keyframes titleGlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .intro-sub { font-size: 16px; color: #888; letter-spacing: 4px; margin-top: 16px; opacity: 0; animation: fadeIn 1s forwards 1.3s; }
    .intro-car { margin-top: 40px; font-size: 48px; opacity: 0; animation: carZoom 2s ease-out forwards 1.5s; }
    @keyframes carZoom { 0% { transform: scale(0.3) rotate(-10deg); opacity: 0; } 50% { opacity: 1; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
    .intro-loader { margin-top: 40px; width: 200px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; opacity: 0; animation: fadeIn 1s forwards 2s; }
    .intro-loader-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #ff6a00, #ee0979); border-radius: 2px; animation: loadBar 2.5s ease-in-out forwards 2.2s; }
    @keyframes loadBar { 0% { width: 0%; } 100% { width: 100%; } }
    @keyframes fadeIn { to { opacity: 1; } }
    .intro-tagline { position: absolute; bottom: 40px; font-size: 12px; color: #444; letter-spacing: 2px; opacity: 0; animation: fadeIn 1s forwards 2.5s; }
  </style>
</head>
<body>
  <div id="intro-screen">
    <div class="speed-line"></div><div class="speed-line"></div><div class="speed-line"></div><div class="speed-line"></div><div class="speed-line"></div>
    <div class="intro-logo">© <span>FAHAD TECH</span>™</div>
    <div class="intro-title">STREET NITRO</div>
    <div class="intro-sub">HIGH-SPEED ARCADE RACING</div>
    <div class="intro-car">🏎️💨</div>
    <div class="intro-loader"><div class="intro-loader-bar"></div></div>
    <div class="intro-tagline">POWERED BY THREE.JS · 60 FPS ON MOBILE</div>
  </div>
  <div id="loading-screen" class="hidden">
    <h1>STREET NITRO</h1>
    <div class="loader"></div>
    <p>Loading game...</p>
  </div>
  <div id="ui-overlay"></div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
